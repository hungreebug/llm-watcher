name: Scheduled LLM Watcher Loop

on:
  schedule:
    - cron: '0 0,12 * * *'
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Install uv and Set up Python
      uses: astral-sh/setup-uv@v5
      with:
        python-version: '3.12'

    - name: Install Project Dependencies
      run: |
        uv pip install yt-dlp google-genai youtube-transcript-api --system

    - name: Run Channel Tracker Scraper
      run: python watcher.py

    - name: Run Gemini Summarizer Engine
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: python summarizer.py

    - name: Commit and Push Updated Data Files
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add data/manifest.json data/table.json
        git diff --quiet && git diff --staged --quiet || (git commit -m "Automated dashboard sync [skip ci]" && git push)
